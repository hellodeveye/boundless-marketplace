<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>电商 BI 看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --card2: #20232f;
      --border: rgba(255,255,255,0.06);
      --text: #e8eaf0;
      --muted: #7a8195;
      --accent: #22d3ee;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "PingFang SC", "Segoe UI", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      padding: 24px;
      font-size: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
    .header-sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: color 0.2s;
    }
    .refresh-btn:hover { color: var(--text); }

    /* Section labels */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* Range tabs */
    .range-tabs {
      display: flex;
      gap: 4px;
      background: var(--card2);
      border: 1px solid var(--border);
      padding: 3px;
      border-radius: 10px;
      width: fit-content;
      margin-bottom: 16px;
    }
    .range-tab {
      padding: 5px 14px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .range-tab.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .kpi-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-size: 26px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
    .kpi-value.green { color: var(--green); }
    .kpi-value.accent { color: var(--accent); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.yellow { color: var(--yellow); }
    .kpi-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }

    /* Account cards */
    .account-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .account-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .account-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .account-value { font-size: 20px; font-weight: 600; }
    .account-value.green  { color: var(--green); }
    .account-value.red    { color: var(--red); }
    .account-value.yellow { color: var(--yellow); }
    .account-value.accent { color: var(--accent); }

    /* Charts row */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .chart-card.full { grid-column: 1 / -1; }
    .chart-card-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    .chart-wrap.tall { height: clamp(220px, 32vh, 300px); }
    .chart-wrap.medium { height: clamp(280px, 38vh, 360px); }
    .chart-wrap.pie { height: clamp(200px, 28vh, 260px); }

    .status { font-size: 12px; color: var(--muted); margin-top: 10px; }
    .error { color: var(--red) !important; }
    .loading { color: var(--muted); font-style: italic; }

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .account-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
      .chart-card.full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">电商 BI 看板</div>
      <div class="header-sub" id="last-updated">加载中...</div>
    </div>
    <button class="refresh-btn" onclick="loadAll()">刷新</button>
  </div>

  <!-- KPI 卡片 -->
  <div class="section-label">核心指标</div>
  <div class="range-tabs">
    <button class="range-tab" data-range="today" onclick="switchRange('today')">今日</button>
    <button class="range-tab active" data-range="month" onclick="switchRange('month')">本月</button>
    <button class="range-tab" data-range="all" onclick="switchRange('all')">全部</button>
  </div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">交易额</div>
      <div class="kpi-value accent" id="kpi-pay-amount">—</div>
      <div class="kpi-sub" id="kpi-pay-sub">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">订单数</div>
      <div class="kpi-value green" id="kpi-order-count">—</div>
      <div class="kpi-sub">已付款/已发货/已完成</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">退款金额</div>
      <div class="kpi-value red" id="kpi-refund-amount">—</div>
      <div class="kpi-sub" id="kpi-refund-sub">—</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">退款单数</div>
      <div class="kpi-value yellow" id="kpi-refund-count">—</div>
      <div class="kpi-sub">已完成退款</div>
    </div>
  </div>

  <!-- 账户资金 -->
  <div class="section-label">账户资金</div>
  <div class="account-grid" style="margin-bottom:20px;">
    <div class="account-card">
      <div class="account-label">累计入账</div>
      <div class="account-value green" id="acc-in">—</div>
    </div>
    <div class="account-card">
      <div class="account-label">累计出账</div>
      <div class="account-value red" id="acc-out">—</div>
    </div>
    <div class="account-card">
      <div class="account-label">结算中</div>
      <div class="account-value yellow" id="acc-settling">—</div>
    </div>
    <div class="account-card">
      <div class="account-label">可提现</div>
      <div class="account-value accent" id="acc-available">—</div>
    </div>
  </div>

  <!-- 趋势图（全宽） -->
  <div class="section-label">订单趋势</div>
  <div style="margin-bottom:14px;">
    <div class="chart-card full">
      <div class="chart-card-title">近 30 天订单趋势</div>
      <div class="chart-wrap tall">
        <canvas id="trendChart"></canvas>
      </div>
      <div class="status" id="trend-status"></div>
    </div>
  </div>

  <!-- 商品 TOP10 + 门店 TOP10 -->
  <div class="section-label">销售排行</div>
  <div class="charts-row" style="margin-bottom:14px;">
    <div class="chart-card">
      <div class="chart-card-title">商品销售 TOP10（元）</div>
      <div class="chart-wrap medium">
        <canvas id="productChart"></canvas>
      </div>
      <div class="status" id="product-status"></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">门店销售 TOP10（元）</div>
      <div class="chart-wrap medium">
        <canvas id="storeChart"></canvas>
      </div>
      <div class="status" id="store-status"></div>
    </div>
  </div>

  <!-- 订单状态分布 -->
  <div class="section-label">订单分布</div>
  <div style="margin-bottom:14px;">
    <div class="chart-card" style="max-width:520px;">
      <div class="chart-card-title">订单状态分布</div>
      <div class="chart-wrap pie">
        <canvas id="statusChart"></canvas>
      </div>
      <div class="status" id="status-status"></div>
    </div>
  </div>

<script>
  const apiBaseUrl = window.AppSDK?.app?.apiBaseUrl
    || new URL(window.location.href).searchParams.get('__boundless_api_base');

  let currentRange = 'month';
  let charts = {};

  function fmtYuan(fen) {
    const yuan = fen / 100;
    if (yuan >= 1e8) return '¥' + (yuan / 1e8).toFixed(2) + ' 亿';
    if (yuan >= 1e4) return '¥' + (yuan / 1e4).toFixed(2) + ' 万';
    return '¥' + yuan.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtNum(n) {
    return Number(n).toLocaleString('zh-CN');
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function truncate(str, n = 12) {
    return str.length > n ? str.slice(0, n) + '…' : str;
  }

  function renderHBarChart(canvasId, labels, values, color, tooltipFn) {
    return new Chart(document.getElementById(canvasId), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '销售额(元)',
          data: values,
          backgroundColor: color.bg,
          borderColor: color.border,
          borderWidth: 1,
          borderRadius: 4,
          maxBarThickness: 24
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: tooltipFn } }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.05)' },
            ticks: { color: '#7a8195', callback: v => v >= 10000 ? (v/10000).toFixed(0)+'万' : v }
          },
          y: { grid: { display: false }, ticks: { color: '#e8eaf0', font: { size: 11 } } }
        }
      }
    });
  }

  async function apiFetch(path) {
    if (!apiBaseUrl) throw new Error('API 地址不可用');
    for (let i = 0; i < 12; i++) {
      try {
        const res = await fetch(`${apiBaseUrl}${path}`);
        if (!res.ok) {
          let msg = `HTTP ${res.status}`;
          try { const j = await res.json(); if (j.error) msg += ': ' + j.error; } catch {}
          throw new Error(msg);
        }
        return await res.json();
      } catch (err) {
        if (i === 11) throw err;
        await sleep(500);
      }
    }
  }

  function switchRange(range) {
    currentRange = range;
    document.querySelectorAll('.range-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.range === range);
    });
    loadOverview();
  }

  async function loadOverview() {
    ['kpi-pay-amount','kpi-order-count','kpi-refund-amount','kpi-refund-count']
      .forEach(id => { document.getElementById(id).textContent = '…'; });
    try {
      const d = await apiFetch(`/api/overview?range=${currentRange}`);
      document.getElementById('kpi-pay-amount').textContent = fmtYuan(d.pay_amount);
      document.getElementById('kpi-order-count').textContent = fmtNum(d.order_count);
      document.getElementById('kpi-refund-amount').textContent = fmtYuan(d.refund_amount);
      document.getElementById('kpi-refund-count').textContent = fmtNum(d.refund_count);
      const rangeLabel = { today: '今日', month: '本月', all: '全部' }[currentRange];
      document.getElementById('kpi-pay-sub').textContent = rangeLabel + '累计交易额';
      document.getElementById('kpi-refund-sub').textContent = rangeLabel + '已完成退款';
    } catch (err) {
      ['kpi-pay-amount','kpi-order-count','kpi-refund-amount','kpi-refund-count']
        .forEach(id => { document.getElementById(id).textContent = '—'; });
    }
  }

  async function loadAccountSummary() {
    try {
      const d = await apiFetch('/api/account-summary');
      document.getElementById('acc-in').textContent = fmtYuan(d.total_in);
      document.getElementById('acc-out').textContent = fmtYuan(d.total_out);
      document.getElementById('acc-settling').textContent = fmtYuan(d.settling);
      document.getElementById('acc-available').textContent = fmtYuan(d.available);
    } catch (err) {
      ['acc-in','acc-out','acc-settling','acc-available']
        .forEach(id => { document.getElementById(id).textContent = '—'; });
    }
  }

  async function loadTrend() {
    const statusEl = document.getElementById('trend-status');
    statusEl.textContent = '';
    try {
      const data = await apiFetch('/api/order-trend?days=30');
      if (charts.trend) charts.trend.destroy();
      const labels = data.map(d => d.dt.slice(5));
      const orders = data.map(d => d.order_count);
      const amounts = data.map(d => +(d.pay_amount / 100).toFixed(2));
      charts.trend = new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: '订单数',
              data: orders,
              yAxisID: 'y1',
              borderColor: 'rgba(34,211,238,0.9)',
              backgroundColor: 'rgba(34,211,238,0.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 2,
              borderWidth: 2
            },
            {
              label: '交易额(元)',
              data: amounts,
              yAxisID: 'y2',
              borderColor: 'rgba(52,211,153,0.9)',
              backgroundColor: 'rgba(52,211,153,0.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 2,
              borderWidth: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#7a8195', font: { size: 12 } } },
            tooltip: {
              callbacks: {
                label: ctx => ctx.dataset.yAxisID === 'y2'
                  ? ` 交易额 ¥${ctx.raw.toLocaleString('zh-CN')}`
                  : ` 订单数 ${ctx.raw.toLocaleString('zh-CN')}`
              }
            }
          },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7a8195', maxRotation: 45 } },
            y1: { position: 'left', grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#7a8195' }, title: { display: true, text: '订单数', color: '#7a8195' } },
            y2: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#7a8195', callback: v => v >= 10000 ? (v/10000).toFixed(0)+'万' : v }, title: { display: true, text: '交易额(元)', color: '#7a8195' } }
          }
        }
      });
    } catch (err) {
      statusEl.textContent = '加载失败: ' + err.message;
      statusEl.className = 'status error';
    }
  }

  async function loadProductTop() {
    const statusEl = document.getElementById('product-status');
    try {
      const data = await apiFetch('/api/product-top?limit=10');
      if (charts.product) charts.product.destroy();
      const sorted = [...data].reverse();
      charts.product = renderHBarChart(
        'productChart',
        sorted.map(d => truncate(d.name)),
        sorted.map(d => +(d.total_amount / 100).toFixed(0)),
        { bg: 'rgba(167,139,250,0.7)', border: 'rgba(167,139,250,1)' },
        ctx => ` ¥${ctx.raw.toLocaleString('zh-CN')}`
      );
      statusEl.textContent = `共 ${data.length} 款商品`;
    } catch (err) {
      statusEl.textContent = '加载失败: ' + err.message;
      statusEl.className = 'status error';
    }
  }

  async function loadStoreTop() {
    const statusEl = document.getElementById('store-status');
    try {
      const data = await apiFetch('/api/store-top?limit=10');
      if (charts.store) charts.store.destroy();
      const sorted = [...data].reverse();
      const orderCounts = sorted.map(d => d.order_count);
      charts.store = renderHBarChart(
        'storeChart',
        sorted.map(d => truncate(d.org_name)),
        sorted.map(d => +(d.total_amount / 100).toFixed(0)),
        { bg: 'rgba(251,191,36,0.7)', border: 'rgba(251,191,36,1)' },
        ctx => ` ¥${ctx.raw.toLocaleString('zh-CN')} (${orderCounts[ctx.dataIndex]} 单)`
      );
      statusEl.textContent = `共 ${data.length} 家门店`;
    } catch (err) {
      statusEl.textContent = '加载失败: ' + err.message;
      statusEl.className = 'status error';
    }
  }


  async function loadOrderStatus() {
    const statusEl = document.getElementById('status-status');
    try {
      const data = await apiFetch('/api/order-status');
      if (charts.status) charts.status.destroy();
      const COLORS = ['#60a5fa','#22d3ee','#34d399','#a78bfa','#4ade80','#f87171','#fbbf24'];
      const total = data.reduce((a, d) => a + d.count, 0);
      charts.status = new Chart(document.getElementById('statusChart'), {
        type: 'doughnut',
        data: {
          labels: data.map(d => d.label),
          datasets: [{
            data: data.map(d => d.count),
            backgroundColor: COLORS.slice(0, data.length),
            borderColor: '#1a1d27',
            borderWidth: 2,
            hoverOffset: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: { color: '#e8eaf0', font: { size: 12 }, padding: 12, boxWidth: 12 }
            },
            tooltip: {
              callbacks: {
                label: ctx => ` ${ctx.label}: ${ctx.raw.toLocaleString('zh-CN')} 单 (${(ctx.raw / total * 100).toFixed(1)}%)`
              }
            }
          }
        }
      });
      statusEl.textContent = `共 ${fmtNum(total)} 单`;
    } catch (err) {
      statusEl.textContent = '加载失败: ' + err.message;
      statusEl.className = 'status error';
    }
  }

  async function loadAll() {
    document.getElementById('last-updated').textContent = '加载中...';
    await Promise.allSettled([
      loadOverview(),
      loadAccountSummary(),
      loadTrend(),
      loadProductTop(),
      loadStoreTop(),
      loadOrderStatus()
    ]);
    const now = new Date().toLocaleString('zh-CN');
    document.getElementById('last-updated').textContent = `最后更新：${now}`;
  }

  loadAll();
</script>
</body>
</html>
