<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ops Console</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --panel: rgba(255, 255, 255, 0.88);
      --line: #d9e0ea;
      --text: #132033;
      --muted: #607087;
      --accent: #1463ff;
      --good: #078f5b;
      --warn: #d07b11;
      --bad: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(20, 99, 255, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(7, 143, 91, 0.1), transparent 24%),
        var(--bg);
      padding: 24px;
    }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }
    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .title {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.03em;
    }
    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.5;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(166, 179, 197, 0.45);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(20, 99, 255, 0.08);
      color: #114ec3;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .input, .button {
      height: 38px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 13px;
    }
    .input {
      min-width: 180px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
    }
    .button {
      padding: 0 14px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }
    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .button:hover { filter: brightness(0.98); }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      padding: 16px;
    }
    .metric-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .metric-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .metric-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .workspace {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 16px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 16px 0;
    }
    .section-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    .section-note {
      color: var(--muted);
      font-size: 12px;
    }
    .list {
      padding: 12px 16px 16px;
      display: grid;
      gap: 10px;
    }
    .ticket {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
    }
    .ticket-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }
    .ticket-id {
      font-weight: 700;
      font-size: 14px;
    }
    .ticket-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .pill {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .severity-high { background: rgba(180, 35, 24, 0.12); color: var(--bad); }
    .severity-medium { background: rgba(208, 123, 17, 0.12); color: var(--warn); }
    .severity-low { background: rgba(7, 143, 91, 0.12); color: var(--good); }
    .service-row, .activity-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(217, 224, 234, 0.8);
    }
    .service-row:last-child, .activity-row:last-child { border-bottom: none; }
    .service-name, .activity-text {
      font-size: 13px;
      color: var(--text);
    }
    .service-meta, .activity-time {
      font-size: 12px;
      color: var(--muted);
    }
    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      padding: 0 16px 16px;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .workspace { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      body { padding: 14px; }
      .grid { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div>
        <h1 class="title">Ops Console</h1>
        <p class="sub">一个更接近真实产品的 Node 示例。前台容器页面通过本地 API 与后台 Node 服务通信，展示队列、服务状态和操作台。</p>
      </div>
      <div class="badge" id="backendState"><span class="badge-dot"></span> Connecting</div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="operatorInput" class="input" placeholder="Operator name" />
        <button id="saveOperatorBtn" class="button">保存 Operator</button>
        <button id="assignBtn" class="button primary">领取下一单</button>
        <button id="playbookBtn" class="button">运行 Playbook</button>
        <button id="resolveBtn" class="button">关闭最老工单</button>
        <button id="resetBtn" class="button">重置数据</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="grid" id="metrics"></section>

    <section class="workspace">
      <div class="panel">
        <div class="section-head">
          <h2 class="section-title">Queue Inbox</h2>
          <span class="section-note" id="queueNote"></span>
        </div>
        <div class="list" id="tickets"></div>
      </div>

      <div class="panel">
        <div class="section-head">
          <h2 class="section-title">Operations Feed</h2>
          <span class="section-note">Node backend live data</span>
        </div>
        <div class="list" id="services"></div>
        <div class="list" id="activity"></div>
      </div>
    </section>
  </div>

  <script>
    const appRuntime = window.AppSDK?.app || {};
    const apiBaseUrl = appRuntime.apiBaseUrl || new URL(window.location.href).searchParams.get('__boundless_api_base');
    const operatorKey = 'OPS_CONSOLE_OPERATOR';

    const metricsEl = document.getElementById('metrics');
    const ticketsEl = document.getElementById('tickets');
    const servicesEl = document.getElementById('services');
    const activityEl = document.getElementById('activity');
    const statusEl = document.getElementById('status');
    const backendStateEl = document.getElementById('backendState');
    const queueNoteEl = document.getElementById('queueNote');
    const operatorInputEl = document.getElementById('operatorInput');

    async function request(path, options) {
      if (!apiBaseUrl) {
        throw new Error('API base URL not available');
      }
      const response = await fetch(`${apiBaseUrl}${path}`, options);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      return await response.json();
    }

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? 'var(--bad)' : 'var(--muted)';
    }

    function setBackendState(text, isHealthy) {
      backendStateEl.innerHTML = `<span class="badge-dot"></span>${text}`;
      backendStateEl.style.color = isHealthy ? '#0f8b5f' : '#b42318';
      backendStateEl.style.background = isHealthy ? 'rgba(7, 143, 91, 0.1)' : 'rgba(180, 35, 24, 0.1)';
    }

    function renderMetrics(data) {
      const cards = [
        ['Open Queue', data.metrics.openTickets, `${data.metrics.assignedCount} assigned in progress`],
        ['Urgent Tickets', data.metrics.urgentCount, `${data.metrics.avgWaitMinutes} min average wait`],
        ['Routing Accuracy', `${data.metrics.routingAccuracy}%`, `${data.metrics.runsToday} automation runs today`],
        ['Avg Handle Time', `${data.metrics.avgHandleMinutes} min`, `Backend uptime ${data.runtime.uptimeSeconds}s`]
      ];

      metricsEl.innerHTML = cards.map(([label, value, note]) => `
        <div class="panel card">
          <div class="metric-label">${label}</div>
          <div class="metric-value">${value}</div>
          <div class="metric-note">${note}</div>
        </div>
      `).join('');
    }

    function renderTickets(data) {
      queueNoteEl.textContent = `${data.tickets.length} active conversations`;
      ticketsEl.innerHTML = data.tickets.map((ticket) => `
        <article class="ticket">
          <div class="ticket-top">
            <div>
              <div class="ticket-id">${ticket.id}</div>
              <div class="ticket-meta">
                <span>${ticket.customer}</span>
                <span>${ticket.channel}</span>
                <span>${ticket.waitMinutes} min waiting</span>
              </div>
            </div>
            <span class="pill severity-${ticket.severity}">${ticket.severity.toUpperCase()}</span>
          </div>
          <div style="margin-top:10px; font-size:13px; line-height:1.5;">${ticket.summary}</div>
          <div class="ticket-meta" style="margin-top:10px;">
            <span>${ticket.assignee ? `Owner: ${ticket.assignee}` : 'Unassigned'}</span>
            <span>Status: ${ticket.status}</span>
          </div>
        </article>
      `).join('');
    }

    function renderServices(data) {
      servicesEl.innerHTML = data.services.map((service) => `
        <div class="service-row">
          <div>
            <div class="service-name">${service.name}</div>
            <div class="service-meta">${service.region}</div>
          </div>
          <div style="text-align:right;">
            <div class="service-name">${service.latencyMs} ms</div>
            <div class="service-meta">${service.status}</div>
          </div>
        </div>
      `).join('');
    }

    function renderActivity(data) {
      activityEl.innerHTML = data.activity.map((item) => `
        <div class="activity-row">
          <div class="activity-text">${item.message}</div>
          <div class="activity-time">${item.time}</div>
        </div>
      `).join('');
    }

    async function refreshDashboard() {
      try {
        const data = await request('/api/dashboard');
        renderMetrics(data);
        renderTickets(data);
        renderServices(data);
        renderActivity(data);
        setBackendState('Backend connected', true);
        setStatus(`Connected to ${apiBaseUrl}`);
      } catch (error) {
        console.error(error);
        setBackendState('Backend unavailable', false);
        setStatus(`Node backend unavailable: ${error.message}`, true);
      }
    }

    async function runAction(actionPath, message) {
      try {
        await request(actionPath, { method: 'POST' });
        setStatus(message);
        await refreshDashboard();
      } catch (error) {
        console.error(error);
        setStatus(`Action failed: ${error.message}`, true);
      }
    }

    async function loadOperator() {
      if (!window.AppSDK?.env) {
        operatorInputEl.value = 'Ava';
        return;
      }
      const saved = await window.AppSDK.env.get(operatorKey);
      operatorInputEl.value = saved || 'Ava';
    }

    async function saveOperator() {
      if (!window.AppSDK?.env) {
        setStatus('AppSDK unavailable, cannot persist operator.', true);
        return;
      }
      await window.AppSDK.env.set(operatorKey, operatorInputEl.value || 'Ava');
      setStatus(`Saved operator: ${operatorInputEl.value || 'Ava'}`);
    }

    document.getElementById('saveOperatorBtn').addEventListener('click', saveOperator);
    document.getElementById('assignBtn').addEventListener('click', () => runAction('/api/actions/assign-next', 'Assigned the next unowned ticket.'));
    document.getElementById('playbookBtn').addEventListener('click', () => runAction('/api/actions/run-playbook', 'Playbook run completed.'));
    document.getElementById('resolveBtn').addEventListener('click', () => runAction('/api/actions/resolve-oldest', 'Resolved the oldest waiting ticket.'));
    document.getElementById('resetBtn').addEventListener('click', () => runAction('/api/actions/reset', 'Reset demo state.'));

    loadOperator().then(refreshDashboard);
    setInterval(refreshDashboard, 5000);
  </script>
</body>
</html>
